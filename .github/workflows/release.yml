name: Release
on:
  push: { tags: ["v*"] }

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libssl-dev patchelf librsvg2-dev golang-go --fix-missing
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: tauri-app/package-lock.json }
      - run: cd tauri-app && npm ci
      - run: cargo install tauri-cli --version "^2.0" --locked
      - run: cd tauri-app && cargo tauri build
      - run: cargo build --release -p process-engine
      - run: cd network-observer && go build -o ../target/release/aegis-network-observer ./cmd/observer
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            tauri-app/src-tauri/target/release/bundle/deb/*.deb
            tauri-app/src-tauri/target/release/bundle/rpm/*.rpm
            tauri-app/src-tauri/target/release/bundle/appimage/*.AppImage
            target/release/aegis-process-engine
            target/release/aegis-network-observer

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: release-artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          name: "Aegis-Guard ${{ github.ref_name }} — by Vladimir Unknown"
          files: release-artifacts/linux-bundles/**
          draft: false
